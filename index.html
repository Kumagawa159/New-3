<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Partage d’écran + voix (WebRTC fiable)</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 900px; margin: 0 auto; padding: 20px; }
    video { width: 100%; max-width: 700px; border: 2px solid #333; margin: 10px 0; background: #000; }
    button, input { padding: 8px 16px; font-size: 16px; margin: 5px; }
    .box { border: 1px solid #ccc; padding: 20px; margin: 20px 0; }
    #roomId { user-select: all; cursor: pointer; font-weight: bold; }
    .status { color: #555; margin-top: 10px; }
    .log-area { background: #f4f4f4; padding: 10px; margin-top: 10px; max-height: 200px; overflow-y: auto; font-family: monospace; font-size: 12px; white-space: pre-wrap; }
    .error { color: red; }
    .success { color: green; }
  </style>
</head>
<body>
  <h1>📺 Partage d’écran + voix (WebRTC + serveur perso)</h1>

  <div class="box">
    <h2>Partager mon écran</h2>
    <button id="startBtn">Démarrer le partage</button>
    <button id="stopBtn" disabled>Arrêter</button>
    <p>ID de la room : <strong id="roomId">—</strong> <span id="copyHint" style="color:green;display:none;">(copié !)</span></p>
    <video id="localVideo" autoplay muted playsinline></video>
    <div class="status" id="hostStatus"></div>
  </div>

  <div class="box">
    <h2>Rejoindre un partage</h2>
    <input type="text" id="roomInput" placeholder="ID de la room" size="30">
    <button id="joinBtn">Rejoindre</button>
    <video id="remoteVideo" autoplay playsinline></video>
    <div class="status" id="viewerStatus"></div>
  </div>

  <div class="box">
    <h3>🔍 Logs de connexion</h3>
    <div class="log-area" id="logArea">En attente…</div>
  </div>

  <script>
    (function() {
      // Configuration des serveurs ICE (STUN/TURN gratuits)
      const rtcConfig = {
        iceServers: [
          { urls: 'stun:stun.l.google.com:19302' },
          { urls: 'stun:stun1.l.google.com:19302' },
          {
            urls: 'turn:eu-0.turn.peerjs.com:3478',
            username: 'peerjs',
            credential: 'peerjsp'
          },
          {
            urls: 'turn:us-0.turn.peerjs.com:3478',
            username: 'peerjs',
            credential: 'peerjsp'
          }
        ]
      };

      // Connexion WebSocket au serveur (même origine)
      const ws = new WebSocket(`ws://${location.host}`);
      let localStream = null;
      let peerConnection = null;
      let isHost = false;
      let roomId = null;

      const localVideo = document.getElementById('localVideo');
      const remoteVideo = document.getElementById('remoteVideo');
      const startBtn = document.getElementById('startBtn');
      const stopBtn = document.getElementById('stopBtn');
      const roomIdSpan = document.getElementById('roomId');
      const copyHint = document.getElementById('copyHint');
      const joinBtn = document.getElementById('joinBtn');
      const roomInput = document.getElementById('roomInput');
      const hostStatus = document.getElementById('hostStatus');
      const viewerStatus = document.getElementById('viewerStatus');
      const logArea = document.getElementById('logArea');

      function addLog(msg, type = 'info') {
        const line = document.createElement('div');
        line.className = type === 'error' ? 'error' : type === 'success' ? 'success' : '';
        line.textContent = new Date().toLocaleTimeString() + ' - ' + msg;
        logArea.appendChild(line);
        logArea.scrollTop = logArea.scrollHeight;
        console.log(msg);
      }

      function setHostStatus(msg) { hostStatus.textContent = msg; addLog('[Hôte] ' + msg); }
      function setViewerStatus(msg) { viewerStatus.textContent = msg; addLog('[Spectateur] ' + msg); }

      // Envoi de messages au serveur
      function send(msg) {
        if (ws.readyState === WebSocket.OPEN) {
          ws.send(JSON.stringify(msg));
        } else {
          addLog('WebSocket non connecté, impossible d’envoyer : ' + msg.type, 'error');
        }
      }

      // Gestion des messages du serveur
      ws.onmessage = (event) => {
        const msg = JSON.parse(event.data);
        addLog('Message reçu : ' + msg.type);
        switch (msg.type) {
          case 'registered':
            if (isHost) {
              roomId = msg.roomId;
              roomIdSpan.textContent = roomId;
              setHostStatus('Room prête, ID : ' + roomId);
            }
            break;

          case 'viewer-joined':
            if (isHost) {
              setHostStatus(`Spectateur connecté (total : ${msg.viewerCount})`);
              addLog('Un spectateur a rejoint, envoi de l’offre...');
              // CORRECTION : on crée l’offre quoi qu’il arrive
              if (!peerConnection) {
                createHostPeerConnection();
              }
              createOffer();
            }
            break;

          case 'offer':
            if (!isHost) {
              handleOffer(msg);
            }
            break;

          case 'answer':
            if (isHost && peerConnection) {
              peerConnection.setRemoteDescription(new RTCSessionDescription(msg))
                .then(() => addLog('Réponse distante appliquée'))
                .catch(e => addLog('Erreur setRemoteDescription (answer) : ' + e.message, 'error'));
            }
            break;

          case 'ice-candidate':
            if (peerConnection && msg.candidate) {
              peerConnection.addIceCandidate(new RTCIceCandidate(msg.candidate))
                .catch(e => addLog('Erreur addIceCandidate : ' + e.message, 'error'));
            }
            break;

          case 'error':
            addLog('Erreur serveur : ' + msg.message, 'error');
            alert('Erreur : ' + msg.message);
            break;
        }
      };

      ws.onopen = () => addLog('Connecté au serveur de signalisation');
      ws.onclose = () => addLog('Déconnecté du serveur, rechargez la page');
      ws.onerror = (err) => addLog('Erreur WebSocket', 'error');

      // --- Hôte : démarrer le partage ---
      startBtn.addEventListener('click', async () => {
        try {
          setHostStatus('Ouverture du sélecteur d’écran…');
          const screenStream = await navigator.mediaDevices.getDisplayMedia({
            video: true,
            audio: true
          });

          // Ajouter le micro
          try {
            const micStream = await navigator.mediaDevices.getUserMedia({ audio: true });
            micStream.getAudioTracks().forEach(track => screenStream.addTrack(track));
            setHostStatus('Microphone ajouté');
          } catch (e) {
            setHostStatus('Micro indisponible');
          }

          localStream = screenStream;
          localVideo.srcObject = localStream;
          isHost = true;
          startBtn.disabled = true;
          stopBtn.disabled = false;

          // Générer un ID de room aléatoire
          roomId = generateId();
          send({ type: 'register', roomId });
          setHostStatus('Création de la room...');

          // Si l'utilisateur arrête le partage via l'UI du navigateur
          localStream.getVideoTracks()[0].addEventListener('ended', () => stopSharing());

        } catch (err) {
          setHostStatus('Erreur : ' + err.message);
          addLog('Erreur capture : ' + err.message, 'error');
        }
      });

      function generateId() {
        return Math.random().toString(36).substring(2, 10) + Date.now().toString(36);
      }

      // Créer une PeerConnection côté hôte
      function createHostPeerConnection() {
        if (peerConnection) peerConnection.close();
        peerConnection = new RTCPeerConnection(rtcConfig);
        localStream.getTracks().forEach(track => peerConnection.addTrack(track, localStream));

        peerConnection.onicecandidate = (event) => {
          if (event.candidate) {
            send({ type: 'ice-candidate', candidate: event.candidate });
          }
        };

        peerConnection.oniceconnectionstatechange = () => {
          addLog('ICE state (hôte) : ' + peerConnection.iceConnectionState);
          if (peerConnection.iceConnectionState === 'failed') {
            setHostStatus('Connexion échouée, redémarrage ICE...');
            peerConnection.restartIce();
          }
        };

        peerConnection.onconnectionstatechange = () => {
          addLog('Connection state (hôte) : ' + peerConnection.connectionState);
        };
      }

      async function createOffer() {
        try {
          const offer = await peerConnection.createOffer();
          await peerConnection.setLocalDescription(offer);
          send({ type: 'offer', sdp: offer.sdp, type: offer.type });
          addLog('Offre envoyée au spectateur');
        } catch (err) {
          addLog('Erreur création offre : ' + err.message, 'error');
        }
      }

      // --- Spectateur : rejoindre ---
      joinBtn.addEventListener('click', () => {
        const rid = roomInput.value.trim();
        if (!rid) return alert('Entrez un ID');
        roomId = rid;
        isHost = false;
        send({ type: 'join', roomId });
        setViewerStatus('Rejoindre la room ' + rid + '...');
      });

      async function handleOffer(offer) {
        if (peerConnection) peerConnection.close();
        peerConnection = new RTCPeerConnection(rtcConfig);

        peerConnection.onicecandidate = (event) => {
          if (event.candidate) {
            send({ type: 'ice-candidate', candidate: event.candidate });
          }
        };

        peerConnection.ontrack = (event) => {
          addLog('Track reçu : ' + event.track.kind);
          if (event.streams[0]) {
            remoteVideo.srcObject = event.streams[0];
            setViewerStatus('Flux reçu !');
            addLog('Flux distant affiché', 'success');
          }
        };

        peerConnection.oniceconnectionstatechange = () => {
          addLog('ICE state (spectateur) : ' + peerConnection.iceConnectionState);
          if (peerConnection.iceConnectionState === 'failed') {
            setViewerStatus('Connexion échouée');
          }
        };

        try {
          await peerConnection.setRemoteDescription(new RTCSessionDescription(offer));
          const answer = await peerConnection.createAnswer();
          await peerConnection.setLocalDescription(answer);
          send({ type: 'answer', sdp: answer.sdp, type: answer.type });
          addLog('Réponse envoyée à l’hôte');
        } catch (err) {
          addLog('Erreur lors de la gestion de l’offre : ' + err.message, 'error');
        }
      }

      // Arrêter le partage
      function stopSharing() {
        addLog('Arrêt du partage...');
        if (localStream) {
          localStream.getTracks().forEach(track => track.stop());
          localVideo.srcObject = null;
        }
        if (peerConnection) peerConnection.close();
        startBtn.disabled = false;
        stopBtn.disabled = true;
        roomIdSpan.textContent = '—';
        setHostStatus('Partage arrêté');
        localStream = null;
        peerConnection = null;
        isHost = false;
        roomId = null;
        remoteVideo.srcObject = null;
      }
      stopBtn.addEventListener('click', stopSharing);

      // Copier l'ID
      roomIdSpan.addEventListener('click', () => {
        const id = roomIdSpan.textContent;
        if (id && id !== '—') {
          navigator.clipboard.writeText(id);
          copyHint.style.display = 'inline';
          setTimeout(() => { copyHint.style.display = 'none'; }, 1500);
        }
      });

      addLog('Page chargée, en attente de connexion WebSocket...');
    })();
  </script>
</body>
</html>
